<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape TrippleT</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white; 
            font-family: monospace; 
        }
        canvas { 
            background-color: #333; 
            border: 4px solid #555;
            box-shadow: 0 0 20px black; 
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            text-align: center;
            font-size: 24px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">Click anywhere to start (Enables audio)</div>
    <canvas id="gameCanvas" width="1024" height="768"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        // Use raw.githubusercontent to bypass CORS restrictions
        const audio = new Audio('https://raw.githubusercontent.com/crazycheese26/Ontsnap-tripple-T/main/DeManMetEenPlan.mp3');
        audio.loop = true;

        const enemyImg = new Image();
        enemyImg.src = 'https://raw.githubusercontent.com/crazycheese26/Ontsnap-tripple-T/main/TrippleT.png';

        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let frameId;

        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', e => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
        });
        
        window.addEventListener('keyup', e => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('click', () => {
            if (!gameStarted) {
                audio.play().catch(e => console.error("Audio playback blocked by browser:", e));
                gameStarted = true;
                ui.style.display = 'none';
                gameLoop();
            } else if (gameOver) {
                resetGame();
            }
        });

        const player = { x: canvas.width / 2, y: canvas.height / 2, size: 15, speed: 6, color: '#4CAF50' };
        const enemy = { x: 50, y: 50, size: 60, speed: 3.5 };

        function resetGame() {
            player.x = canvas.width / 2; 
            player.y = canvas.height / 2;
            enemy.x = 50; 
            enemy.y = 50;
            score = 0;
            gameOver = false;
            ui.style.display = 'none';
            gameLoop();
        }

        function update() {
            if (gameOver) return;

            // Normalize diagonal movement
            let moveX = 0;
            let moveY = 0;
            
            if (keys.w) moveY -= 1;
            if (keys.s) moveY += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;

            if (moveX !== 0 || moveY !== 0) {
                const length = Math.sqrt(moveX * moveX + moveY * moveY);
                player.x += (moveX / length) * player.speed;
                player.y += (moveY / length) * player.speed;
            }

            // Boundary constraints
            if (player.x < player.size) player.x = player.size;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
            if (player.y < player.size) player.y = player.size;
            if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;

            // Enemy tracking mechanics
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > 0) {
                enemy.x += (dx / dist) * enemy.speed;
                enemy.y += (dy / dist) * enemy.speed;
            }

            score += 1;
            enemy.speed = 3.5 + (score / 1500); // Progressive difficulty scaling

            // Collision parameters
            const collisionDistance = (player.size + (enemy.size / 2.5));
            if (dist < collisionDistance) {
                gameOver = true;
                cancelAnimationFrame(frameId);
                ui.style.display = 'block';
                ui.innerHTML = `GAME OVER<br>Frames survived: ${score}<br><br>Click to restart`;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Render Player
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Render Enemy
            if (enemyImg.complete) {
                ctx.drawImage(enemyImg, enemy.x - enemy.size/2, enemy.y - enemy.size/2, enemy.size, enemy.size);
            } else {
                ctx.fillStyle = 'red';
                ctx.fillRect(enemy.x - enemy.size/2, enemy.y - enemy.size/2, enemy.size, enemy.size);
            }
            
            // Render Score
            ctx.fillStyle = "white";
            ctx.font = "20px monospace";
            ctx.fillText(`Score: ${score}`, 20, 30);
        }

        function gameLoop() {
            update();
            draw();
            if (!gameOver) {
                frameId = requestAnimationFrame(gameLoop);
            }
        }

        draw(); // Initial render state
    </script>
</body>
</html>
